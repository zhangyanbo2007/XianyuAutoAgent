<!doctype html>
<html lang='zh-CN'><head><meta charset='utf-8' />
<style>
* { box-sizing: border-box; }
body { margin:0; width:1920px; height:1080px; overflow:hidden; background:#05070d; color:#f8fafc; font-family:'Noto Sans CJK SC','Noto Sans SC',Arial,sans-serif; }
.stage { position:relative; width:100%; height:100%; padding:54px 72px; background: radial-gradient(circle at 50% 25%, #fbbf2422, transparent 34%), linear-gradient(135deg,#05070d,#0b1020 55%,#05070d); }
.stage:before { content:''; position:absolute; inset:24px; border:2px solid #fbbf2488; box-shadow:0 0 28px #fbbf2466 inset; }
.kicker { position:relative; z-index:2; color:#fbbf24; font-size:28px; letter-spacing:1px; }
h1 { position:relative; z-index:2; margin:24px 0 20px; font-size:72px; line-height:1.12; text-shadow:0 0 22px #fbbf2499; }
.anchor { position:absolute; z-index:2; right:72px; top:64px; max-width:560px; color:#9ca3af; font-size:23px; text-align:right; }
.visual { position:relative; z-index:2; height:650px; margin-top:20px; display:flex; align-items:center; justify-content:center; }
.subtitle-safe { position:absolute; z-index:1; left:72px; right:72px; bottom:58px; height:170px; background:linear-gradient(180deg,transparent,#02061799); }
.count { position:absolute; right:82px; bottom:26px; color:#64748b; font-size:20px; }
.cards,.matrix,.takeaways,.roadmap { display:grid; grid-template-columns:repeat(2,minmax(260px,1fr)); gap:28px; width:1200px; }
.card,.matrix div,.takeaways div,.roadmap div,.split div,.transfer div { min-height:150px; padding:28px; border:1px solid #fbbf2499; background:#0f172acc; box-shadow:0 0 28px #fbbf2444; border-radius:16px; }
.card b { display:block; font-size:82px; color:#fbbf24; } .card span { font-size:28px; color:#cbd5e1; }
.matrix div,.takeaways div,.roadmap div { font-size:38px; display:flex; align-items:center; justify-content:center; text-align:center; }
.split,.transfer { display:grid; grid-template-columns:1fr 1fr; align-items:center; gap:42px; width:1280px; }
.split div h3 { color:#fbbf24; font-size:54px; margin:0 0 24px; } .split div p,.transfer div { font-size:34px; line-height:1.45; }
.transfer b { font-size:92px; color:#fbbf24; }
.bars { display:flex; align-items:end; gap:80px; height:420px; } .bars div { display:flex; flex-direction:column; align-items:center; gap:16px; } .bars b { font-size:42px; color:#fbbf24; } .bars i { display:block; width:116px; background:linear-gradient(#fbbf24,#7c3aed); box-shadow:0 0 26px #fbbf24; border-radius:14px 14px 0 0; } .bars span { font-size:28px; }
.rank { width:1240px; display:flex; flex-direction:column; gap:24px; } .rank div { display:flex; align-items:center; gap:24px; font-size:32px; } .rank span { width:280px; } .rank i { height:34px; display:block; background:linear-gradient(90deg,#fbbf24,#f472b6); border-radius:999px; box-shadow:0 0 18px #fbbf24; }
.iceberg { text-align:center; color:#cbd5e1; } .iceberg strong { display:block; margin:28px auto; width:620px; height:260px; padding-top:92px; font-size:44px; color:#fbbf24; background:linear-gradient(145deg,#0f172a,#111827); clip-path:polygon(50% 0,100% 100%,0 100%); filter:drop-shadow(0 0 28px #fbbf24); }
.orb { width:360px; height:360px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:180px; color:#fbbf24; border:2px solid #fbbf24; box-shadow:0 0 80px #fbbf24; }
</style></head>
<body><main class='stage'>
<div class='kicker'>future_direction · Scene 20</div>
<div class='anchor'>future: memory architecture</div>
<h1>未来方向：给 AI 装上海马体</h1>
<section class='visual'><div class='roadmap'><div>Structured Attention</div><div>Temporal Grounding</div><div>Strategic Forgetting</div></div></section>
<div class='subtitle-safe'></div>
<div class='count'>20 / 25</div>
</main></body></html>
