<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  background: #0a0a0f;
  font-family: 'Noto Sans SC', sans-serif;
  color: #e2e8f0;
  overflow: hidden;
  position: relative;
}
.bg-image {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.6; filter: blur(1px);
}
.bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 50%, rgba(10,10,15,0.95) 100%);
}
.header {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px; background: linear-gradient(90deg, #38bdf8, #f472b6, #a78bfa);
  z-index: 10;
}
.label {
  position: absolute; top: 40px; left: 60px;
  background: #38bdf8; color: #000;
  padding: 8px 20px; border-radius: 8px;
  font-size: 20px; font-weight: 700;
}
.num {
  position: absolute; top: 30px; right: 60px;
  font-size: 140px; font-weight: 900;
  color: rgba(56,189,248,0.08);
}
.title {
  position: absolute; top: 100px; left: 60px; right: 60px;
  font-size: 48px; font-weight: 900;
  line-height: 1.3;
}
.content {
  position: absolute; top: 200px; left: 60px; right: 60px; bottom: 100px;
  display: flex; gap: 40px;
}
.left { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.right { flex: 1; display: flex; align-items: center; justify-content: center; }
.text-block {
  background: rgba(17,24,39,0.6);
  border: 1px solid rgba(56,189,248,0.15);
  border-radius: 16px; padding: 30px;
  font-size: 36px; line-height: 1.6;
  font-weight: 700;
}
.footer {
  position: absolute; bottom: 30px; left: 60px; right: 60px;
  display: flex; justify-content: space-between; align-items: center;
  color: #94a3b8; font-size: 16px;
}
.progress-bar {
  position: absolute; bottom: 0; left: 0;
  height: 4px; background: #38bdf8;
  transition: width 0.3s;
}
.icon {
  width: 80px; height: 80px;
  border-radius: 20px; display: flex;
  align-items: center; justify-content: center;
  font-size: 40px; margin-bottom: 20px;
}
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.card {
  background: rgba(17,24,39,0.6);
  border: 1px solid rgba(56,189,248,0.15);
  border-radius: 12px; padding: 20px;
}
.card h3 { font-size: 20px; margin-bottom: 8px; color: #38bdf8; }
.card p { font-size: 18px; color: #94a3b8; }
.chart-container { width: 100%; height: 100%; }
</style>
</head>

    <div class="label">为何记忆如此关键</div>
    <div class="content" style="top:140px;z-index:5;">
      <div class="left" style="flex:1;">
        <div class="text-block" style="font-size:30px;">为什么记忆对AI这么重要？因为未来的AI助手需要记住你的偏好、理解上下文、从过去的经验中学习。。如果AI连视频都记不住，怎么可能记住你上周说的话、你家人的名字、你的工作习惯？记忆是智能的基础，没有好的记忆，就没有真正的智能。</div>
